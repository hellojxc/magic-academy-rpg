<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Magic Academy RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #100a1d;
      overflow: hidden;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #100a1d;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .game-hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: min(430px, calc(100vw - 220px));
      min-width: 320px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 222, 129, 0.32);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(20, 12, 32, 0.78), rgba(20, 12, 32, 0.48));
      color: #ffd6ec;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
      line-height: 1.45;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .game-hud strong { color: #ffe07a; }
    .hud-topline {
      white-space: nowrap;
    }
    .hud-derived {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      color: rgba(244, 231, 255, 0.86);
      font-size: 12px;
    }
    .hud-stat-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 4px;
      margin-top: 8px;
    }
    .hud-stat {
      display: flex;
      min-width: 0;
      justify-content: space-between;
      gap: 4px;
      padding: 3px 5px;
      border: 1px solid rgba(255, 224, 122, 0.16);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(244, 231, 255, 0.86);
      font-size: 11px;
    }
    .hud-stat b { color: #ffe07a; font-weight: 700; }
    .hud-skill-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 8px;
    }
    .hud-skill-grid > div {
      min-width: 0;
      padding: 6px;
      border: 1px solid rgba(159, 220, 255, 0.18);
      border-radius: 6px;
      background: rgba(10, 18, 32, 0.32);
      font-size: 11px;
    }
    .hud-skill-grid b,
    .hud-skill-grid strong,
    .hud-skill-grid span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hud-skill-grid b { color: rgba(244, 231, 255, 0.7); }
    .hud-skill-grid strong { color: #ffe07a; }
    .hud-loadout {
      overflow: hidden;
      margin-top: 7px;
      color: rgba(244, 231, 255, 0.78);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hud-help {
      margin-top: 6px;
      color: rgba(244, 231, 255, 0.72);
      font-size: 12px;
    }
    .interaction-prompt {
      position: fixed;
      z-index: 15;
      transform: translate(-50%, -100%);
      padding: 8px 12px;
      border: 1px solid rgba(255, 224, 122, 0.78);
      border-radius: 999px;
      background: rgba(17, 9, 29, 0.82);
      color: #ffe07a;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 5px #000;
      pointer-events: none;
    }
    .dialogue-box {
      position: absolute;
      left: 50%;
      bottom: 22px;
      z-index: 20;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      width: min(1080px, calc(100vw - 44px));
      min-height: 250px;
      transform: translateX(-50%);
      padding: 16px;
      border: 1px solid rgba(255, 224, 122, 0.65);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(17, 10, 29, 0.92), rgba(21, 12, 36, 0.86));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      color: #f2eaff;
      backdrop-filter: blur(12px);
    }
    .dialogue-box[hidden] { display: none; }
    .dialogue-portrait-frame {
      position: relative;
      overflow: hidden;
      min-height: 218px;
      border: 1px solid rgba(255, 224, 122, 0.48);
      border-radius: 8px;
      background: radial-gradient(circle at 50% 38%, rgba(132, 105, 255, 0.35), rgba(25, 14, 40, 0.74));
    }
    .dialogue-portrait {
      position: absolute;
      left: 50%;
      bottom: -30px;
      width: 178px;
      max-width: none;
      transform: translateX(-50%);
      filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.42));
    }
    .dialogue-content {
      display: flex;
      min-width: 0;
      flex-direction: column;
    }
    .dialogue-name {
      margin: 2px 0 12px;
      color: #ffe07a;
      font-size: 20px;
      font-weight: 800;
      text-shadow: 0 2px 6px #000;
    }
    .dialogue-body {
      min-height: 74px;
      color: #f4edf9;
      font-size: 17px;
      line-height: 1.7;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.72);
    }
    .dialogue-choices {
      display: grid;
      gap: 8px;
      margin-top: auto;
      padding-top: 14px;
    }
    .dialogue-choice {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255, 224, 122, 0.22);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: #d9caef;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .dialogue-choice.is-selected,
    .dialogue-choice:hover {
      border-color: rgba(255, 224, 122, 0.76);
      background: rgba(255, 224, 122, 0.14);
      color: #ffe07a;
    }
    .minimap {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 12;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    .r3f-canvas-shell {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #111725;
    }
    .r3f-react-root {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .r3f-canvas-shell canvas {
      cursor: crosshair;
    }
    .r3f-loading {
      padding: 8px 12px;
      border: 1px solid rgba(157, 226, 255, 0.32);
      border-radius: 8px;
      background: rgba(8, 14, 24, 0.72);
      color: #dff2ff;
      font-size: 13px;
      white-space: nowrap;
      pointer-events: none;
    }
    .r3f-npc-label {
      display: grid;
      gap: 2px;
      min-width: 76px;
      padding: 5px 8px;
      border: 1px solid rgba(255, 224, 122, 0.42);
      border-radius: 8px;
      background: rgba(11, 12, 22, 0.68);
      color: #fff1c2;
      text-align: center;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .r3f-npc-label strong {
      color: #ffe07a;
      font-size: 12px;
      line-height: 1.1;
    }
    .r3f-npc-label span {
      color: rgba(244, 231, 255, 0.8);
      font-size: 10px;
      line-height: 1.1;
      white-space: nowrap;
    }
    @media (max-width: 640px) {
      .game-hud {
        top: 10px;
        left: 10px;
        width: min(244px, calc(100vw - 146px));
        min-width: 0;
        padding: 9px 10px;
        font-size: 12px;
      }
      .hud-topline { white-space: normal; }
      .hud-derived { gap: 5px; font-size: 10px; }
      .hud-stat-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 3px; }
      .hud-stat { padding: 2px 4px; font-size: 10px; }
      .hud-skill-grid { grid-template-columns: 1fr; gap: 4px; }
      .hud-skill-grid > div { padding: 4px 5px; font-size: 10px; }
      .hud-loadout { font-size: 10px; }
      .hud-help { font-size: 11px; }
      .minimap {
        top: 10px;
        right: 10px;
        transform: scale(0.75);
        transform-origin: top right;
      }
      .dialogue-box {
        bottom: 10px;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 10px;
        width: calc(100vw - 20px);
        min-height: 188px;
        padding: 10px;
      }
      .dialogue-portrait-frame {
        min-height: 166px;
      }
      .dialogue-portrait {
        bottom: -18px;
        width: 122px;
      }
      .dialogue-name {
        margin-bottom: 6px;
        font-size: 16px;
      }
      .dialogue-body {
        min-height: 62px;
        font-size: 14px;
        line-height: 1.55;
      }
      .dialogue-choices {
        gap: 6px;
        padding-top: 8px;
      }
      .dialogue-choice {
        padding: 7px 8px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

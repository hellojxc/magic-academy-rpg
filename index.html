<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Academy RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #100a1d;
      overflow: hidden;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #100a1d;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .game-hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      min-width: 190px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 222, 129, 0.32);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(20, 12, 32, 0.78), rgba(20, 12, 32, 0.48));
      color: #ffd6ec;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
      line-height: 1.45;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .game-hud strong { color: #ffe07a; }
    .hud-help {
      margin-top: 6px;
      color: rgba(244, 231, 255, 0.72);
      font-size: 12px;
    }
    .interaction-prompt {
      position: fixed;
      z-index: 15;
      transform: translate(-50%, -100%);
      padding: 8px 12px;
      border: 1px solid rgba(255, 224, 122, 0.78);
      border-radius: 999px;
      background: rgba(17, 9, 29, 0.82);
      color: #ffe07a;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 5px #000;
      pointer-events: none;
    }
    .dialogue-box {
      position: absolute;
      left: 50%;
      bottom: 22px;
      z-index: 20;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      width: min(1080px, calc(100vw - 44px));
      min-height: 250px;
      transform: translateX(-50%);
      padding: 16px;
      border: 1px solid rgba(255, 224, 122, 0.65);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(17, 10, 29, 0.92), rgba(21, 12, 36, 0.86));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      color: #f2eaff;
      backdrop-filter: blur(12px);
    }
    .dialogue-box[hidden] { display: none; }
    .dialogue-portrait-frame {
      position: relative;
      overflow: hidden;
      min-height: 218px;
      border: 1px solid rgba(255, 224, 122, 0.48);
      border-radius: 8px;
      background: radial-gradient(circle at 50% 38%, rgba(132, 105, 255, 0.35), rgba(25, 14, 40, 0.74));
    }
    .dialogue-portrait {
      position: absolute;
      left: 50%;
      bottom: -30px;
      width: 178px;
      max-width: none;
      transform: translateX(-50%);
      filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.42));
    }
    .dialogue-content {
      display: flex;
      min-width: 0;
      flex-direction: column;
    }
    .dialogue-name {
      margin: 2px 0 12px;
      color: #ffe07a;
      font-size: 20px;
      font-weight: 800;
      text-shadow: 0 2px 6px #000;
    }
    .dialogue-body {
      min-height: 74px;
      color: #f4edf9;
      font-size: 17px;
      line-height: 1.7;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.72);
    }
    .dialogue-choices {
      display: grid;
      gap: 8px;
      margin-top: auto;
      padding-top: 14px;
    }
    .dialogue-choice {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255, 224, 122, 0.22);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: #d9caef;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .dialogue-choice.is-selected,
    .dialogue-choice:hover {
      border-color: rgba(255, 224, 122, 0.76);
      background: rgba(255, 224, 122, 0.14);
      color: #ffe07a;
    }
    @media (max-width: 640px) {
      .game-hud {
        top: 10px;
        left: 10px;
        min-width: 150px;
        padding: 9px 10px;
        font-size: 12px;
      }
      .hud-help { font-size: 11px; }
      .dialogue-box {
        bottom: 10px;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 10px;
        width: calc(100vw - 20px);
        min-height: 188px;
        padding: 10px;
      }
      .dialogue-portrait-frame {
        min-height: 166px;
      }
      .dialogue-portrait {
        bottom: -18px;
        width: 122px;
      }
      .dialogue-name {
        margin-bottom: 6px;
        font-size: 16px;
      }
      .dialogue-body {
        min-height: 62px;
        font-size: 14px;
        line-height: 1.55;
      }
      .dialogue-choices {
        gap: 6px;
        padding-top: 8px;
      }
      .dialogue-choice {
        padding: 7px 8px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
